name: Balochistan Forecast Scraper

on:
  repository_dispatch:
    # This allows you to trigger ONLY this script from Cron-job.org
    types: [trigger_balochistan]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright google-api-python-client google-auth
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_balochistan_forecast.py
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: Save Results (GitHub Backup)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add *.pdf
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Auto-update: Balochistan Forecast"
            git push origin main
          fi
