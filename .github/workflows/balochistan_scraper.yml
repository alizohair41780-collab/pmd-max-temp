name: Balochistan Forecast Scraper

on:
  repository_dispatch:
    # Triggered by Cron-job.org with {"event_type": "trigger_balochistan"}
    types: [trigger_balochistan]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    # Using macOS instead of Ubuntu to try and bypass IP blocking
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added playwright-stealth to help bypass the security wall
          pip install playwright google-api-python-client google-auth playwright-stealth
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_balochistan_forecast.py
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: Save Results (GitHub Backup)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest to avoid merge conflicts
          git pull origin main --rebase
          
          # Add the new PDF
          git add *.pdf || echo "No PDF found to add"
          
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Auto-update: Balochistan Forecast PDF generated"
            git push origin main
          else
            echo "No changes detected."
          fi
