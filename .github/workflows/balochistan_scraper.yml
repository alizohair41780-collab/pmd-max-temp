name: Balochistan Forecast Scraper

on:
  repository_dispatch:
    types: [trigger_balochistan]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    # We will keep macOS for now as it often has "cleaner" IP ranges than Ubuntu
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Removed the stealth library to prevent crashes
          pip install playwright google-api-python-client google-auth
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_balochistan_forecast.py
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: Save Results (GitHub Backup)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add *.pdf || echo "No PDF found"
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Auto-update: Balochistan Forecast PDF"
            git push origin main
          else
            echo "No changes to commit."
          fi
