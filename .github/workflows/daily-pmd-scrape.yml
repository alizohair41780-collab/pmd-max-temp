name: PMD Temperature Scraper

on:
  schedule:
    # 11:00 UTC is 4:00 PM PKT (Pakistan Standard Time)
    # 15:00 UTC is 8:00 PM PKT (Pakistan Standard Time)
    - cron: '0 11,15 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py

      - name: Save Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the new screenshot and any generated excel files
          git add ncm_snapshot_*.png 2>/dev/null || echo "No screenshots found"
          git add *.xlsx 2>/dev/null || echo "No excel files found"
          
          # Commit only if there are changes (new files)
          if [ -n "$(git status --short)" ]; then
            git commit -m "Auto-update: Data/Screenshot - $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes detected, nothing to push."
          fi
