name: PMD Temperature Scraper

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase
          
          # CLEANUP: Remove old screenshots so only the newest one stays
          # This keeps your repo size small and clean
          git rm ncm_snapshot_*.png || echo "No old snapshots to remove"
          
          # Add the new screenshot and files
          git add .
          
          # Commit and push only if changes exist
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Auto-update: Data/Screenshot - $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes detected, nothing to push."
          fi
