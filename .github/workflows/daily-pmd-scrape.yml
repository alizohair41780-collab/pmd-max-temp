name: PMD Temperature Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py

      - name: Save Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the screenshot and any excel files
          git add -f *.png *.xlsx 2>/dev/null || echo "No files found to add"
          
          # Check if there is anything to commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: Data/Screenshot - $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected, nothing to push."
          fi
