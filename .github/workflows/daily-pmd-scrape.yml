name: PMD Temperature Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py

      - name: Save Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # This specifically tells git to include the new screenshot file
          git add ncm_snapshot_*.png 2>/dev/null || echo "No screenshots found"
          git add *.xlsx 2>/dev/null || echo "No excel files found"
          
          # Check if there is anything new to upload
          if [ -n "$(git status --short)" ]; then
            git commit -m "Auto-update: Data/Screenshot - $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "Nothing new to save."
          fi
