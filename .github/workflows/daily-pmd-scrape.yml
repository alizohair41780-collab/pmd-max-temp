name: PMD Temperature Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install playwright pandas openpyxl

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Run the scraper
        run: python fetch_pmd_temps.py

      - name: Commit and push updated Excel
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # This specifically adds the file your script creates
          git add NCM_UAE_Daily_Climate_Report.xlsx
          
          # This checks if there's actually a new file to save
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update UAE Weather Data - $(date)"
            git push
          fi
