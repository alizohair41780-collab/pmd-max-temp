name: PMD Temperature Scraper

on:
  # This is the "Ear" that listens for your Cron-job.org signal
  repository_dispatch:
    types: [trigger_scrape]
  # This keeps your manual "Run workflow" button active
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase
          
          # CLEANUP: Remove old screenshots and PDFs to keep it clean
          # This ensures only the LATEST PDF is visible in your folder
          git rm *.png || echo "No images to delete"
          git rm *.pdf || echo "No old PDFs to delete"
          
          # Add the new PDF report
          git add *.pdf
          
          # Commit and push only if the new PDF exists
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Weather PDF Update: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No new PDF detected, nothing to push."
          fi
