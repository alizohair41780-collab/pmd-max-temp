name: PMD Temperature Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  # This clears the warning by forcing the newer Node.js 24 runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install playwright pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run the scraper
        # We add a small fix here to handle the timeout better
        run: python fetch_pmd_temps.py

      - name: Commit and push updated Excel
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the specific file name used in your python script
          git add NCM_UAE_Daily_Climate_Report.xlsx
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update UAE Weather Data - $(date)"
            git push
          fi
