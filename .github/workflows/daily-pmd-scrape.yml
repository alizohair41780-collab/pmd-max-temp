name: PMD Temperature Scraper

on:
  # Listen for Cron-job.org
  repository_dispatch:
    types: [trigger_scrape]
  # Manual run button
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added the Google libraries here
          pip install playwright google-api-python-client google-auth pandas openpyxl
          python -m playwright install chromium --with-deps

      - name: Run Scraper
        run: python fetch_pmd_temps.py
        env:
          # This connects your GitHub Secret to the Python script
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: Save Results (GitHub Backup)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest to avoid errors
          git pull origin main --rebase
          
          # Clean up old local files
          git rm *.png || echo "No images to delete"
          git rm *.pdf || echo "No old PDFs to delete"
          
          # Add the new PDF that was just generated
          git add *.pdf || echo "No PDF found to add"
          
          if [[ -n "$(git status --short)" ]]; then
            git commit -m "Auto-update: New PDF generated and uploaded to Drive"
            git push origin main
          else
            echo "No changes detected."
          fi
