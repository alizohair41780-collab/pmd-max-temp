name: Daily PMD Max Temp Scrape

on:
  schedule:
    - cron: '0 14 * * *'      # 11:05 PM Pakistan time (UTC+5)
  workflow_dispatch:          # Allows manual run anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl
          playwright install chromium --with-deps
          
      - name: Run scraper
        run: python fetch_pmd_temps.py
        
      - name: Commit and push updated Excel
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PMD_Max_Temperatures.xlsx
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes"
          git push
